<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>

</head>

<body class="bg-gray-100 h-screen overflow-hidden">

<div id="app" class="h-screen">

<!-- HEADER -->
<div class="fixed top-0 w-full h-14 bg-blue-500 text-white flex items-center px-3">
  <div class="font-bold">Chat</div>
</div>

<!-- CHAT -->
<div ref="msgBox"
  class="absolute top-14 bottom-24 left-0 right-0 overflow-y-auto p-2 flex flex-col">

  <div v-for="(m,i) in chat" @click="setReply(m)"
    :class="['max-w-[75%] p-2 my-1 rounded-xl text-sm',
    m.me ? 'bg-blue-500 text-white self-end' : 'bg-gray-200 self-start']">

    <div v-if="m.reply" class="text-xs opacity-70 border-l-2 pl-2 mb-1">
      {{ m.reply.msg }}
    </div>

    <template v-if="m.type==='message'">
      {{ m.msg }}
    </template>

    <template v-if="m.type==='image'">
      <img :src="m.img" class="max-w-[150px] rounded mt-1">
    </template>

    <template v-if="m.type==='audio'">
      <audio controls :src="m.audio"></audio>
    </template>

    <div class="text-[10px] text-right mt-1">
      {{ m.time }} <span v-if="m.me">✔✔</span>
    </div>
  </div>

</div>

<!-- REPLY BOX -->
<div v-if="replyMsg"
  class="absolute bottom-24 left-0 right-0 bg-gray-200 px-3 py-1 text-sm flex justify-between">
  <span>{{ replyMsg.msg }}</span>
  <button @click="replyMsg=null">✖</button>
</div>

<!-- EMOJI -->
<div v-if="showEmoji"
  class="absolute bottom-20 bg-white w-full p-2 flex flex-wrap gap-2">
  <span v-for="e in emojis" @click="message+=e" class="text-xl cursor-pointer">{{ e }}</span>
</div>

<!-- INPUT -->
<div class="fixed bottom-0 w-full bg-white flex items-center gap-2 p-2">

  <!-- EMOJI BTN -->
  <button @click="toggleEmoji">😊</button>

  <!-- INPUT -->
  <textarea v-model="message"
    @input="autoResize"
    @keydown.enter.prevent="handleEnter"
    rows="1"
    placeholder="Type..."
    class="flex-1 border rounded-full px-3 py-2 resize-none"></textarea>

  <!-- MIC / SEND -->
  <button @click="actionBtn"
    class="bg-blue-500 text-white px-4 py-2 rounded-full transition-all">

    <span v-if="!message">🎤</span>
    <span v-else>➤</span>

  </button>

</div>

</div>

<script>
const { createApp } = Vue;

createApp({
data(){
return{
ws:null,
message:"",
chat:[],
replyMsg:null,
showEmoji:false,
emojis:["😀","😂","😍","😭","👍","🔥","😎","🙏"],
mediaRecorder:null,
audioChunks:[],
}
},

mounted(){
this.ws=new WebSocket("wss://chat-realtime.jihadwajib68.workers.dev");

this.ws.onmessage=(e)=>{
const d=JSON.parse(e.data);
this.chat.push(d);
this.$nextTick(()=>this.scroll());
};
},

methods:{

// EMOJI
toggleEmoji(){
this.showEmoji=!this.showEmoji;
},

// AUTO HEIGHT
autoResize(e){
e.target.style.height="auto";
e.target.style.height=e.target.scrollHeight+"px";
},

// ENTER
handleEnter(e){
if(e.shiftKey){
this.message+="\n";
}else{
this.send();
}
},

// REPLY
setReply(msg){
this.replyMsg=msg;
},

// ACTION BTN
actionBtn(){
if(this.message){
this.send();
}else{
this.recordAudio();
}
},

// SEND MESSAGE
send(){
const payload={
type:"message",
msg:this.message,
reply:this.replyMsg,
time:new Date().toLocaleTimeString().slice(0,5)
};

this.ws.send(JSON.stringify(payload));
this.chat.push({...payload,me:true});

this.message="";
this.replyMsg=null;
},

// AUDIO
async recordAudio(){
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
this.mediaRecorder=new MediaRecorder(stream);

this.mediaRecorder.start();
this.audioChunks=[];

this.mediaRecorder.ondataavailable=e=>{
this.audioChunks.push(e.data);
};

this.mediaRecorder.onstop=()=>{
const blob=new Blob(this.audioChunks);
const url=URL.createObjectURL(blob);

const payload={
type:"audio",
audio:url,
time:new Date().toLocaleTimeString().slice(0,5)
};

this.ws.send(JSON.stringify(payload));
this.chat.push({...payload,me:true});
};

// stop setelah 3 detik (demo)
setTimeout(()=>this.mediaRecorder.stop(),3000);
},

scroll(){
const el=this.$refs.msgBox;
el.scrollTop=el.scrollHeight;
}

}
}).mount("#app");
</script>

</body>
</html>
