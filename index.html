<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/vue@3"></script>

<style>
body{margin:0;font-family:system-ui;background:#f2f2f2}
.app{display:flex;flex-direction:column;height:100vh}

.header{
  background:#0b93f6;color:#fff;padding:12px;
  display:flex;align-items:center;gap:10px;
}

.avatar{
  width:35px;height:35px;border-radius:50%;
  background:#fff;color:#0b93f6;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;
}

.messages{
  flex:1;overflow:auto;padding:10px;
  display:flex;flex-direction:column;
}

.bubble{
  max-width:75%;padding:10px;margin:5px 0;
  border-radius:18px;font-size:14px;
}

.received{align-self:flex-start;background:#e5e5ea}
.sent{align-self:flex-end;background:#0b93f6;color:#fff}

.time{font-size:10px;opacity:.6;text-align:right}

img{max-width:180px;border-radius:10px}

.input{
  display:flex;align-items:center;padding:8px;
  background:#fff;gap:8px;border-top:1px solid #ddd;
}

.plus{
  width:36px;height:36px;border-radius:50%;
  background:#e5e5ea;display:flex;
  align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;
}

.text-input{
  flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;
}

.send-btn{
  background:#0b93f6;color:#fff;border:none;
  padding:10px 15px;border-radius:50%;
}

input[type="file"]{display:none}

.typing{font-size:12px;padding-left:10px;color:#555}
.status{font-size:12px;opacity:.8}
</style>
</head>

<body>

<div id="app" class="app">

<div class="header">
  <div class="avatar">{{ username.charAt(0).toUpperCase() }}</div>
  <div>
    <div><b>Global Chat</b></div>
    <div class="status">{{ status }} • {{ users }} online</div>
  </div>
</div>

<div class="messages" ref="msgBox" @scroll="handleScroll">
  <div v-for="m in chat" :class="['bubble', m.me?'sent':'received']">

    <template v-if="m.type==='message'">
      {{ m.msg }}
    </template>

    <template v-if="m.type==='image'">
      <img :src="m.img">
    </template>

    <div class="time">{{ m.time }}</div>
  </div>
</div>

<div class="typing" v-if="typingUser">
  {{ typingUser }} mengetik...
</div>

<div class="input">
  <div class="plus" @click="openFile">+</div>

  <input class="text-input"
    v-model="message"
    @input="typing"
    @keydown.enter="send"
    placeholder="Type a message..."
  >

  <button class="send-btn" @click="send">➤</button>

  <input type="file" ref="file" @change="sendImage">
</div>

</div>

<script>
const { createApp } = Vue;

createApp({
data(){
return{
ws:null,
username:localStorage.getItem("username")||"",
message:"",
chat:[],
users:0,
typingUser:"",
clientId:Math.random().toString(36),
autoScroll:true,
pingInterval:null,
status:"connecting..."
}
},

mounted(){
if(!this.username){
this.username=prompt("Masukkan nama:");
localStorage.setItem("username",this.username);
}

this.connect();
this.startPing();
},

beforeUnmount(){
clearInterval(this.pingInterval);
},

methods:{
connect(){
this.ws=new WebSocket("wss://chat-realtime.jihadwajib68.workers.dev");

this.ws.onopen=()=>{
this.status="online";

this.ws.send(JSON.stringify({
type:"join",
user:this.username
}));
};

this.ws.onclose=()=>{
this.status="reconnecting...";
setTimeout(()=>this.connect(),2000);
};

this.ws.onerror=()=>{
this.status="error";
};

this.ws.onmessage=(e)=>{
const d=JSON.parse(e.data);

// system
if(d.type==="system"){
this.users=d.users;
}

// message
if(d.type==="message"){
if(d.clientId===this.clientId) return;
d.time=new Date().toLocaleTimeString().slice(0,5);
this.chat.push({...d,me:false});
}

// image
if(d.type==="image"){
if(d.clientId===this.clientId) return;
d.time=new Date().toLocaleTimeString().slice(0,5);
this.chat.push({...d,me:false});
}

// typing
if(d.type==="typing"){
this.typingUser=d.user;
setTimeout(()=>this.typingUser="",1000);
}

this.$nextTick(()=>{
if(this.autoScroll) this.scroll();
});
};
},

// 🔥 KEEP ALIVE
startPing(){
this.pingInterval=setInterval(()=>{
if(this.ws && this.ws.readyState===1){
this.ws.send(JSON.stringify({type:"ping"}));
}
},20000);
},

send(){
if(!this.message) return;

const payload={
type:"message",
msg:this.message,
clientId:this.clientId
};

this.ws.send(JSON.stringify({
...payload,
user:this.username
}));

payload.time=new Date().toLocaleTimeString().slice(0,5);

this.chat.push({...payload,me:true});
this.message="";
},

openFile(){
this.$refs.file.click();
},

sendImage(e){
const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=()=>{
const payload={
type:"image",
img:reader.result,
clientId:this.clientId
};

this.ws.send(JSON.stringify({
...payload,
user:this.username
}));

payload.time=new Date().toLocaleTimeString().slice(0,5);

this.chat.push({...payload,me:true});
};

reader.readAsDataURL(file);
},

typing(){
if(this.ws.readyState===1){
this.ws.send(JSON.stringify({
type:"typing",
user:this.username
}));
}
},

scroll(){
const el=this.$refs.msgBox;
el.scrollTop=el.scrollHeight;
},

handleScroll(){
const el=this.$refs.msgBox;
this.autoScroll = el.scrollTop + el.clientHeight >= el.scrollHeight - 50;
}
}
}).mount("#app");
</script>

</body>
</html>
