<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vue Chat Realtime</title>

<!-- Vue CDN -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
:root{
  --bg:#f0f2f5;
  --chat:#e5ddd5;
  --green:#25d366;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
}

.container{
  display:flex;
  flex-direction:column;
  height:100vh;
}

.header{
  background:#fff;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid #ddd;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ccc;
}

.messages{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  background:var(--chat);
}

.bubble{
  max-width:75%;
  padding:8px 10px;
  margin:5px 0;
  border-radius:10px;
  animation:fade .2s;
}

.sent{
  align-self:flex-end;
  background:var(--green);
  color:#fff;
}

.received{
  align-self:flex-start;
  background:#fff;
}

.name{
  font-size:11px;
  font-weight:bold;
  opacity:.6;
}

.input-area{
  display:flex;
  padding:10px;
  background:#fff;
  gap:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

button{
  background:var(--green);
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:50%;
}

.name-box{
  padding:10px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

@keyframes fade{
  from{opacity:0;transform:translateY(5px)}
  to{opacity:1}
}
</style>
</head>

<body>

<div id="app" class="container">

<div class="name-box">
  <input v-model="username" placeholder="Masukkan nama kamu..." />
</div>

<div class="header">
  <div class="avatar"></div>
  <div>
    <b>Global Chat</b><br>
    <small>{{ status }}</small>
  </div>
</div>

<div class="messages" ref="messages">
  <div v-for="(m,i) in chat" :key="i" :class="['bubble', m.me ? 'sent':'received']">
    <div class="name">{{ m.user }}</div>
    <div>{{ m.msg }}</div>
  </div>
</div>

<div class="input-area">
  <input v-model="message" @keydown.enter="send" placeholder="Ketik pesan..." />
  <button @click="send">➤</button>
</div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data(){
    return{
      ws:null,
      status:'connecting...',
      username:'',
      message:'',
      chat:[],
      clientId: Math.random().toString(36).substring(2),
      WS_URL: "wss://chat-realtime.jihadwajib68.workers.dev"
    }
  },

  mounted(){
    this.connect();
  },

  methods:{
    connect(){
      try{
        this.ws = new WebSocket(this.WS_URL);

        this.ws.onopen = ()=> this.status='online';
        this.ws.onclose = ()=> this.status='offline';
        this.ws.onerror = ()=> this.status='error';

        this.ws.onmessage = (e)=>{
          let data;

          try{
            data = JSON.parse(e.data);
          }catch{
            data = { user:"User", msg:e.data };
          }

          if(data.clientId === this.clientId) return;

          this.chat.push({...data, me:false});
          this.$nextTick(()=> this.scrollBottom());
        };

      }catch(err){
        alert(err);
      }
    },

    send(){
      if(!this.username){
        alert("Isi nama dulu!");
        return;
      }

      if(!this.message || !this.ws || this.ws.readyState!==1) return;

      const payload={
        user:this.username,
        msg:this.message,
        clientId:this.clientId
      };

      this.ws.send(JSON.stringify(payload));

      this.chat.push({...payload, me:true});
      this.message='';

      this.$nextTick(()=> this.scrollBottom());
    },

    scrollBottom(){
      const el = this.$refs.messages;
      el.scrollTop = el.scrollHeight;
    }
  }
}).mount("#app");
</script>

</body>
</html>
