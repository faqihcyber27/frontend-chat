<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0b93f6">

</head>

<body class="bg-gray-100 h-screen overflow-hidden">

<div id="app" class="h-screen">

<!-- HEADER -->
<div class="fixed top-0 w-full h-14 bg-blue-500 text-white flex items-center px-3 z-10">
  <div class="w-9 h-9 rounded-full bg-white text-blue-500 flex items-center justify-center font-bold">
    {{ username.charAt(0).toUpperCase() }}
  </div>
  <div class="ml-2">
    <div class="font-bold">Global Chat</div>
    <div class="text-xs opacity-80">{{ status }} • {{ users }} online</div>
  </div>
</div>

<!-- CHAT -->
<div ref="msgBox"
  class="absolute top-14 bottom-20 left-0 right-0 overflow-y-auto p-2 flex flex-col">

  <div v-for="m in chat"
    :class="['max-w-[75%] p-2 my-1 rounded-xl text-sm',
    m.me ? 'bg-blue-500 text-white self-end' : 'bg-gray-200 self-start']">

    <template v-if="m.type==='message'">
      {{ m.msg }}
    </template>

    <template v-if="m.type==='image'">
      <img :src="m.img" class="max-w-[180px] rounded-md mt-1">
    </template>

    <div class="text-[10px] opacity-60 text-right mt-1">{{ m.time }}</div>
  </div>

</div>

<!-- TYPING -->
<div v-if="typingUser"
  class="absolute bottom-20 left-3 text-xs text-gray-500">
  {{ typingUser }} mengetik...
</div>

<!-- INPUT -->
<div class="fixed bottom-0 w-full bg-white border-t flex items-center gap-2 p-2 z-10">

  <!-- PLUS -->
  <div @click="openFile"
    class="w-9 h-9 rounded-full bg-gray-200 flex items-center justify-center text-xl">
    +
  </div>

  <!-- TEXTAREA -->
  <textarea ref="input"
    v-model="message"
    @input="autoResize"
    @keydown.enter.prevent="handleEnter"
    rows="1"
    placeholder="Type a message..."
    class="flex-1 resize-none border rounded-full px-3 py-2 max-h-32 outline-none"></textarea>

  <!-- SEND -->
  <button @click="send"
    class="bg-blue-500 text-white px-4 py-2 rounded-full">
    ➤
  </button>

  <input type="file" ref="file" @change="sendImage" class="hidden">

</div>

</div>

<script>
const { createApp } = Vue;

createApp({
data(){
return{
ws:null,
username:localStorage.getItem("username")||"",
message:"",
chat:[],
users:0,
typingUser:"",
clientId:Math.random().toString(36),
pingInterval:null,
status:"connecting..."
}
},

mounted(){
if(!this.username){
this.username=prompt("Masukkan nama:");
localStorage.setItem("username",this.username);
}

this.connect();
this.startPing();
this.handleKeyboard();
},

methods:{
connect(){
this.ws=new WebSocket("wss://chat-realtime.jihadwajib68.workers.dev");

this.ws.onopen=()=>{
this.status="online";
this.ws.send(JSON.stringify({type:"join",user:this.username}));
};

this.ws.onclose=()=>{
this.status="reconnecting...";
setTimeout(()=>this.connect(),2000);
};

this.ws.onmessage=(e)=>{
const d=JSON.parse(e.data);

if(d.type==="system") this.users=d.users;

if(d.type==="message"||d.type==="image"){
if(d.clientId===this.clientId) return;

d.time=new Date().toLocaleTimeString().slice(0,5);
this.chat.push({...d,me:false});
}

if(d.type==="typing"){
this.typingUser=d.user;
setTimeout(()=>this.typingUser="",1000);
}

this.$nextTick(()=>this.scroll());
};
},

// 🔥 AUTO HEIGHT
autoResize(){
const el=this.$refs.input;
el.style.height="auto";
el.style.height=el.scrollHeight+"px";
},

// ENTER HANDLING
handleEnter(e){
if(e.shiftKey){
this.message+="\n";
} else {
this.send();
}
},

// FIX KEYBOARD
handleKeyboard(){
if(window.visualViewport){
window.visualViewport.addEventListener("resize",()=>{
const vh=window.visualViewport.height;
const full=window.innerHeight;
const keyboard=full-vh;

const input=document.querySelector(".fixed.bottom-0");

if(keyboard>100){
input.style.bottom=keyboard+"px";
} else {
input.style.bottom="0px";
}
});
}
},

startPing(){
this.pingInterval=setInterval(()=>{
if(this.ws.readyState===1){
this.ws.send(JSON.stringify({type:"ping"}));
}
},20000);
},

send(){
if(!this.message) return;

const payload={
type:"message",
msg:this.message,
clientId:this.clientId
};

this.ws.send(JSON.stringify({...payload,user:this.username}));

payload.time=new Date().toLocaleTimeString().slice(0,5);
this.chat.push({...payload,me:true});

this.message="";
this.$refs.input.style.height="auto";
},

openFile(){
this.$refs.file.click();
},

sendImage(e){
const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=()=>{
const payload={
type:"image",
img:reader.result,
clientId:this.clientId
};

this.ws.send(JSON.stringify({...payload,user:this.username}));
this.chat.push({...payload,me:true});
};

reader.readAsDataURL(file);
},

scroll(){
const el=this.$refs.msgBox;
el.scrollTop=el.scrollHeight;
}
}
}).mount("#app");
</script>

</body>
</html>
