<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Mobile</title>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<style>
:root{
  --bg:#e5ddd5;
  --green:#25d366;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
}

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header{
  background:#075e54;
  color:#fff;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#ccc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* CHAT */
.messages{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.bubble{
  max-width:75%;
  padding:8px 10px;
  margin:5px 0;
  border-radius:10px;
}

.sent{
  align-self:flex-end;
  background:var(--green);
  color:#fff;
}

.received{
  align-self:flex-start;
  background:#fff;
}

.name{
  font-size:11px;
  font-weight:bold;
  opacity:.6;
}

.time{
  font-size:10px;
  text-align:right;
  opacity:.5;
}

/* INPUT */
.input-area{
  display:flex;
  padding:10px;
  background:#fff;
  gap:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

button{
  background:var(--green);
  border:none;
  color:#fff;
  padding:10px 15px;
  border-radius:50%;
}

/* NAME MODAL */
.modal{
  position:fixed;
  inset:0;
  background:#00000080;
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:80%;
}

</style>
</head>

<body>

<div id="app" class="app">

<!-- HEADER -->
<div class="header">
  <div class="avatar">{{ username.charAt(0).toUpperCase() }}</div>
  <div>
    <div><b>Global Chat</b></div>
    <small>{{ status }}</small>
  </div>
</div>

<!-- CHAT -->
<div class="messages" ref="messages">
  <div v-for="(m,i) in chat" :key="i" :class="['bubble', m.me?'sent':'received']">
    <div class="name">{{ m.user }}</div>
    <div>{{ m.msg }}</div>
    <div class="time">{{ m.time }}</div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <input v-model="message" @keydown.enter="send" placeholder="Ketik pesan...">
  <button @click="send">➤</button>
</div>

<!-- MODAL NAMA -->
<div class="modal" v-if="!username">
  <div class="modal-box">
    <h3>Masukkan Nama</h3>
    <input v-model="tempName" placeholder="Nama kamu...">
    <br><br>
    <button @click="saveName">Masuk</button>
  </div>
</div>

</div>

<script>
const { createApp } = Vue;

createApp({
data(){
return{
ws:null,
status:'connecting...',
username:'',
tempName:'',
message:'',
chat:[],
clientId:Math.random().toString(36).substring(2),
WS_URL:"wss://chat-realtime.jihadwajib68.workers.dev"
}
},

mounted(){
this.username = localStorage.getItem("username") || "";
this.connect();
},

methods:{
connect(){
this.ws=new WebSocket(this.WS_URL);

this.ws.onopen=()=>this.status='online';
this.ws.onclose=()=>this.status='offline';

this.ws.onmessage=(e)=>{
let data;
try{
data=JSON.parse(e.data);
}catch{
data={user:"User",msg:e.data};
}

if(data.clientId===this.clientId) return;

data.time=new Date().toLocaleTimeString().slice(0,5);

this.chat.push({...data,me:false});
this.$nextTick(()=>this.scroll());
};
},

saveName(){
if(!this.tempName) return;
this.username=this.tempName;
localStorage.setItem("username", this.tempName);
},

send(){
if(!this.username){
alert("Isi nama dulu!");
return;
}

if(!this.message || this.ws.readyState!==1) return;

const payload={
user:this.username,
msg:this.message,
clientId:this.clientId
};

this.ws.send(JSON.stringify(payload));

payload.time=new Date().toLocaleTimeString().slice(0,5);

this.chat.push({...payload,me:true});
this.message='';

this.$nextTick(()=>this.scroll());
},

scroll(){
const el=this.$refs.messages;
el.scrollTop=el.scrollHeight;
}
}
}).mount("#app");
</script>

</body>
</html>
