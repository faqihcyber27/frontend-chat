<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">

<script src="https://unpkg.com/vue@3"></script>

<style>
body{margin:0;font-family:sans-serif;background:#e5ddd5}
.app{display:flex;flex-direction:column;height:100vh}

.header{background:#075e54;color:#fff;padding:10px;display:flex;justify-content:space-between}
.messages{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column}

.bubble{padding:8px;margin:5px;border-radius:10px;max-width:70%}
.sent{align-self:flex-end;background:#25d366;color:#fff}
.received{align-self:flex-start;background:#fff}
.system{align-self:center;background:#ddd;font-size:12px}

img{max-width:150px;border-radius:10px}

.input{display:flex;padding:10px;background:#fff;gap:5px}
input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc}
</style>
</head>

<body>

<div id="app" class="app">

<div class="header">
  <div>{{ username }}</div>
  <div>{{ users }} online</div>
</div>

<div class="messages" ref="msgBox">
  <div v-for="m in chat" :class="['bubble',
    m.type==='system'?'system':
    m.me?'sent':'received']">

    <template v-if="m.type==='message'">
      <b>{{ m.user }}</b><br>
      {{ m.msg }}
    </template>

    <template v-if="m.type==='image'">
      <b>{{ m.user }}</b><br>
      <img :src="m.img">
    </template>

    <template v-if="m.type==='system'">
      {{ m.msg }}
    </template>

  </div>
</div>

<div v-if="typingUser">{{ typingUser }} mengetik...</div>

<div class="input">
  <input type="file" @change="sendImage">
  <input v-model="message" @input="typing" @keydown.enter="send">
</div>

</div>

<script>
const { createApp } = Vue;

createApp({
data(){
return{
ws:null,
username:localStorage.getItem("username")||"",
message:"",
chat:[],
users:0,
typingUser:"",
clientId:Math.random().toString(36)
}
},

mounted(){
if(!this.username){
this.username=prompt("Nama kamu:");
localStorage.setItem("username",this.username);
}

if("Notification" in window){
  Notification.requestPermission();
}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js");
}

this.connect();
},

methods:{
connect(){
this.ws=new WebSocket("wss://chat-realtime.jihadwajib68.workers.dev");

this.ws.onopen=()=>{
this.ws.send(JSON.stringify({
type:"join",
user:this.username
}));
};

this.ws.onmessage=(e)=>{
const d=JSON.parse(e.data);

// notif
if(document.hidden && d.type==="message"){
new Notification(d.user+": "+d.msg);
}

// system
if(d.type==="system"){
this.users=d.users;
this.chat.push(d);
}

// message
if(d.type==="message"){
if(d.clientId===this.clientId) return;
this.chat.push({...d,me:false});
}

// image
if(d.type==="image"){
if(d.clientId===this.clientId) return;
this.chat.push({...d,me:false});
}

// typing
if(d.type==="typing"){
this.typingUser=d.user;
setTimeout(()=>this.typingUser="",1000);
}

this.$nextTick(()=>this.scroll());
};
},

send(){
if(!this.message) return;

const payload={
type:"message",
user:this.username,
msg:this.message,
clientId:this.clientId
};

this.ws.send(JSON.stringify(payload));
this.chat.push({...payload,me:true});
this.message="";
},

sendImage(e){
const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=()=>{
const payload={
type:"image",
user:this.username,
img:reader.result,
clientId:this.clientId
};

this.ws.send(JSON.stringify(payload));
this.chat.push({...payload,me:true});
};

reader.readAsDataURL(file);
},

typing(){
this.ws.send(JSON.stringify({
type:"typing",
user:this.username
}));
},

scroll(){
const el=this.$refs.msgBox;
el.scrollTop=el.scrollHeight;
}
}
}).mount("#app");
</script>

</body>
</html>
