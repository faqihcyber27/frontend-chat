<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>
</head>

<body class="bg-gray-100 h-screen overflow-hidden">

<div id="app" class="h-screen">

<!-- CHAT -->
<div ref="msgBox"
class="absolute top-0 bottom-20 w-full overflow-y-auto p-2 flex flex-col">

<div v-for="m in chat"
:class="['max-w-[75%] p-2 my-1 rounded-xl text-sm',
m.me?'bg-blue-500 text-white self-end':'bg-gray-200']">

{{ m.msg }}

<audio v-if="m.audio" controls :src="m.audio"></audio>

<div class="text-[10px] text-right">
{{ m.time }}

<span v-if="m.me">
  {{ m.status === 'sent' ? '✔' : '' }}
  {{ m.status === 'delivered' ? '✔✔' : '' }}
  <span v-if="m.status==='read'" class="text-blue-200">✔✔</span>
</span>

</div>

</div>

</div>

<!-- TYPING -->
<div v-if="typingUser"
class="absolute bottom-20 left-3 text-xs text-gray-500">
{{ typingUser }} mengetik...
</div>

<!-- INPUT -->
<div class="fixed bottom-0 w-full bg-white flex items-center gap-2 p-2">

<textarea v-model="message"
@input="typing"
@keydown.enter.prevent="send"
class="flex-1 border rounded-full px-3 py-2 resize-none"></textarea>

<!-- HOLD TO RECORD -->
<button
@mousedown="startRecord"
@mouseup="stopRecord"
@touchstart="startRecord"
@touchend="stopRecord"
class="bg-blue-500 text-white px-4 py-2 rounded-full">

<span v-if="!recording && !message">🎤</span>
<span v-if="message">➤</span>
<span v-if="recording">⏺</span>

</button>

</div>

</div>

<script>
const { createApp } = Vue;

createApp({
data(){
return{
ws:null,
message:"",
chat:[],
typingUser:"",
clientId:Math.random(),
recording:false,
mediaRecorder:null,
chunks:[]
}
},

mounted(){
this.ws=new WebSocket("wss://chat-realtime.jihadwajib68.workers.dev");

this.ws.onopen=()=>{
this.ws.send(JSON.stringify({type:"join",user:"User"}));
};

this.ws.onmessage=(e)=>{
const d=JSON.parse(e.data);

// ACK
if(d.type==="ack"){
const msg=this.chat.find(x=>x.id===d.id);
if(msg) msg.status=d.status;
return;
}

// typing
if(d.type==="typing"){
this.typingUser="User";
setTimeout(()=>this.typingUser="",1000);
return;
}

// message/audio
this.chat.push({...d,me:false});
this.scroll();
};
},

methods:{

// SEND
send(){
if(!this.message) return;

const id=Date.now();

const msg={
id,
type:"message",
msg:this.message,
status:"sent",
time:new Date().toLocaleTimeString().slice(0,5),
me:true
};

this.ws.send(JSON.stringify(msg));
this.chat.push(msg);
this.message="";
},

// TYPING
typing(){
this.ws.send(JSON.stringify({type:"typing"}));
},

// 🎤 HOLD RECORD
async startRecord(){
if(this.message) return;

this.recording=true;

const stream=await navigator.mediaDevices.getUserMedia({audio:true});
this.mediaRecorder=new MediaRecorder(stream);

this.mediaRecorder.start();
this.chunks=[];

this.mediaRecorder.ondataavailable=e=>{
this.chunks.push(e.data);
};
},

stopRecord(){
if(!this.recording) return;

this.recording=false;

this.mediaRecorder.stop();

this.mediaRecorder.onstop=()=>{
const blob=new Blob(this.chunks);
const url=URL.createObjectURL(blob);

const id=Date.now();

const msg={
id,
type:"audio",
audio:url,
status:"sent",
time:new Date().toLocaleTimeString().slice(0,5),
me:true
};

this.ws.send(JSON.stringify(msg));
this.chat.push(msg);
};
},

scroll(){
this.$nextTick(()=>{
const el=this.$refs.msgBox;
el.scrollTop=el.scrollHeight;
});
}

}
}).mount("#app");
</script>

</body>
</html>
