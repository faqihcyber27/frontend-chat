<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/vue@3"></script>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0b93f6">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f2f2f2;
  height:100vh;
  overflow:hidden;
}

.app{
  height:100vh;
}

/* HEADER FIX */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#0b93f6;
  color:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  z-index:10;
}

.avatar{
  width:35px;height:35px;border-radius:50%;
  background:#fff;color:#0b93f6;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;
}

/* CHAT SCROLL */
.messages{
  position:absolute;
  top:60px;
  bottom:70px;
  left:0;
  right:0;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  scroll-behavior:smooth;
}

.bubble{
  max-width:75%;
  padding:10px;
  margin:5px 0;
  border-radius:18px;
  font-size:14px;
}

.received{align-self:flex-start;background:#e5e5ea}
.sent{align-self:flex-end;background:#0b93f6;color:#fff}

.time{font-size:10px;opacity:.6;text-align:right}

img{max-width:180px;border-radius:10px}

/* INPUT FIX */
.input{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:70px;
  background:#fff;
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px;
  border-top:1px solid #ddd;
  z-index:10;
}

.plus{
  width:36px;height:36px;border-radius:50%;
  background:#e5e5ea;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;
}

.text-input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

.send-btn{
  background:#0b93f6;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:50%;
}

input[type="file"]{display:none}

.typing{
  position:absolute;
  bottom:75px;
  left:10px;
  font-size:12px;
  color:#555;
}

.status{font-size:12px;opacity:.8}
</style>
</head>

<body>

<div id="app" class="app">

<!-- HEADER -->
<div class="header">
  <div class="avatar">{{ username.charAt(0).toUpperCase() }}</div>
  <div>
    <div><b>Global Chat</b></div>
    <div class="status">{{ status }} • {{ users }} online</div>
  </div>
</div>

<!-- CHAT -->
<div class="messages" ref="msgBox" @scroll="handleScroll">
  <div v-for="m in chat" :class="['bubble', m.me?'sent':'received']">

    <template v-if="m.type==='message'">
      {{ m.msg }}
    </template>

    <template v-if="m.type==='image'">
      <img :src="m.img">
    </template>

    <div class="time">{{ m.time }}</div>
  </div>
</div>

<!-- TYPING -->
<div class="typing" v-if="typingUser">
  {{ typingUser }} mengetik...
</div>

<!-- INPUT -->
<div class="input">
  <div class="plus" @click="openFile">+</div>

  <input class="text-input"
    v-model="message"
    @input="typing"
    @keydown.enter="send"
    placeholder="Type a message..."
  >

  <button class="send-btn" @click="send">➤</button>

  <input type="file" ref="file" @change="sendImage">
</div>

</div>

<script>
const { createApp } = Vue;

function urlBase64ToUint8Array(base64String){
  const padding="=".repeat((4-base64String.length%4)%4);
  const base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(base64);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}

createApp({
data(){
return{
ws:null,
username:localStorage.getItem("username")||"",
message:"",
chat:[],
users:0,
typingUser:"",
clientId:Math.random().toString(36),
autoScroll:true,
pingInterval:null,
status:"connecting..."
}
},

async mounted(){

if(!this.username){
this.username=prompt("Masukkan nama:");
localStorage.setItem("username",this.username);
}

// PUSH NOTIF
if("serviceWorker" in navigator){
  try{
    const reg = await navigator.serviceWorker.register("/sw.js");

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly:true,
      applicationServerKey:urlBase64ToUint8Array(
        "BOr7W0h2d0z3bY7p1sV8Qk0vX6KxX7g0gQ1cKpXc1Y8q3xv5WvXK7p4Fqz9rT1X3yW5mZ0dQ8vL3ZcQ2p6Wz9yU"
      )
    });

    await fetch("https://chat-realtime.jihadwajib68.workers.dev/subscribe",{
      method:"POST",
      body:JSON.stringify(sub)
    });

  }catch(e){
    console.log("Push error",e);
  }
}

this.connect();
this.startPing();
},

beforeUnmount(){
clearInterval(this.pingInterval);
},

methods:{
connect(){
this.ws=new WebSocket("wss://chat-realtime.jihadwajib68.workers.dev");

this.ws.onopen=()=>{
this.status="online";

this.ws.send(JSON.stringify({
type:"join",
user:this.username
}));
};

this.ws.onclose=()=>{
this.status="reconnecting...";
setTimeout(()=>this.connect(),2000);
};

this.ws.onerror=()=>{
this.status="error";
};

this.ws.onmessage=(e)=>{
const d=JSON.parse(e.data);

if(d.type==="system") this.users=d.users;

if(d.type==="message"||d.type==="image"){
if(d.clientId===this.clientId) return;

d.time=new Date().toLocaleTimeString().slice(0,5);
this.chat.push({...d,me:false});
}

if(d.type==="typing"){
this.typingUser=d.user;
setTimeout(()=>this.typingUser="",1000);
}

this.$nextTick(()=>{
if(this.autoScroll) this.scroll();
});
};
},

startPing(){
this.pingInterval=setInterval(()=>{
if(this.ws && this.ws.readyState===1){
this.ws.send(JSON.stringify({type:"ping"}));
}
},20000);
},

send(){
if(!this.message) return;

const payload={
type:"message",
msg:this.message,
clientId:this.clientId
};

this.ws.send(JSON.stringify({...payload,user:this.username}));

payload.time=new Date().toLocaleTimeString().slice(0,5);

this.chat.push({...payload,me:true});
this.message="";
},

openFile(){
this.$refs.file.click();
},

sendImage(e){
const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=()=>{
const payload={
type:"image",
img:reader.result,
clientId:this.clientId
};

this.ws.send(JSON.stringify({...payload,user:this.username}));

payload.time=new Date().toLocaleTimeString().slice(0,5);

this.chat.push({...payload,me:true});
};

reader.readAsDataURL(file);
},

typing(){
if(this.ws.readyState===1){
this.ws.send(JSON.stringify({
type:"typing",
user:this.username
}));
}
},

scroll(){
const el=this.$refs.msgBox;
el.scrollTop=el.scrollHeight;
},

handleScroll(){
const el=this.$refs.msgBox;
this.autoScroll = el.scrollTop + el.clientHeight >= el.scrollHeight - 50;
}
}
}).mount("#app");
</script>

</body>
</html>
