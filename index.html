<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realtime Chat</title>

<style>
:root{
  --bg:#f0f2f5;
  --chat:#e5ddd5;
  --green:#25d366;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
}

.container{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
.header{
  background:#fff;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid #ddd;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ccc;
}

/* MESSAGES */
.messages{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  background:var(--chat);
}

.bubble{
  max-width:75%;
  padding:8px 10px;
  margin:5px 0;
  border-radius:10px;
  animation:fade .2s;
}

.sent{
  align-self:flex-end;
  background:var(--green);
  color:#fff;
}

.received{
  align-self:flex-start;
  background:#fff;
}

.name{
  font-size:11px;
  font-weight:bold;
  opacity:.6;
}

/* INPUT */
.input-area{
  display:flex;
  padding:10px;
  background:#fff;
  gap:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

button{
  background:var(--green);
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:50%;
  cursor:pointer;
}

.name-box{
  padding:10px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

@keyframes fade{
  from{opacity:0;transform:translateY(5px)}
  to{opacity:1}
}
</style>

<!-- DEBUG (BIAR ERROR KELIHATAN DI HP) -->
<script>
window.onerror = function(msg, url, line){
  document.body.innerHTML += "<pre style='color:red'>" + msg + "</pre>";
};
</script>

</head>

<body>

<div class="container">

<div class="name-box">
  <input id="username" placeholder="Masukkan nama kamu..." />
</div>

<div class="header">
  <div class="avatar"></div>
  <div>
    <b>Global Chat</b><br>
    <small id="status">connecting...</small>
  </div>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
  <input id="msg" placeholder="Ketik pesan..." />
  <button onclick="send()">➤</button>
</div>

</div>

<script>
const WS_URL = "wss://chat-realtime.jihadwajib68.workers.dev";

let ws;
const messages = document.getElementById("messages");
const status = document.getElementById("status");

// unique id biar gak double
const clientId = Math.random().toString(36).substring(2);

function addMessage(user, text, me=false){
  const div = document.createElement("div");
  div.className = "bubble " + (me ? "sent" : "received");

  const name = document.createElement("div");
  name.className = "name";
  name.innerText = user;

  const msg = document.createElement("div");
  msg.innerText = text;

  div.appendChild(name);
  div.appendChild(msg);

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function connect(){
  try {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => status.innerText = "online";
    ws.onclose = () => status.innerText = "offline";
    ws.onerror = () => status.innerText = "error";

    ws.onmessage = (e) => {
      let data;

      try {
        data = JSON.parse(e.data);
      } catch {
        data = { user: "User", msg: e.data };
      }

      if(data.clientId === clientId) return;

      addMessage(data.user, data.msg, false);
    };

  } catch (err) {
    document.body.innerHTML += "<pre>"+err+"</pre>";
  }
}

function send(){
  const user = document.getElementById("username").value;
  const msg = document.getElementById("msg").value;

  if(!user){
    alert("Isi nama dulu!");
    return;
  }

  if(!msg || !ws || ws.readyState !== 1) return;

  const payload = {
    user,
    msg,
    clientId
  };

  ws.send(JSON.stringify(payload));

  addMessage(user, msg, true);
  document.getElementById("msg").value = "";
}

// enter kirim
document.getElementById("msg").addEventListener("keydown", e=>{
  if(e.key === "Enter") send();
});

connect();
</script>

</body>
</html>
